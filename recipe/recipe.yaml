schema_version: 1

context:
  name: tmuxp
  version: "1.73.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: 504c58d210bb1c359e21243f98c64b31c327a83928e22d7cf0cca80db35e3d97

build:
  # Seeing weird errors like the following on Windows, along with weird encoding.
  # https://learn.microsoft.com/en-us/cpp/error-messages/tool-errors/c-runtime-error-r6033?view=msvc-170
  number: 0
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install --no-deps --no-build-isolation . -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
  run:
    - python >=${{ python_min }}
    - colorama >=0.3.9
    - pyyaml >=6.0
    - libtmux >=0.44.0
    - __unix

tests:
  - files:
      recipe:
        - session.yaml
    requirements:
      run:
        - python ${{ python_min }}.*
        - pip
    script:
      - pip check
      - if: unix
        then:
          - tmuxp --version
          - tmuxp load -d -y ./session.yaml

about:
  summary: Session manager for tmux, build on libtmux
  description: |
    Session manager for tmux, which allows users to save and load tmux sessions through simple
    configuration files.
    Powered by libtmux.
  license: MIT
  license_file: LICENSE
  homepage: https://tmuxp.git-pull.com/
  repository: https://github.com/tmux-python/tmuxp
  documentation: https://tmuxp.git-pull.com/

extra:
  recipe-maintainers:
    - AntoinePrv
    - tony
